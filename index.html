<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥋 태권도장 마스터 시스템 v8.3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #151d30;
            --input-bg: #090c15;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --accent-blue: #38bdf8;
            --border-color: #1e293b;
            --tkd-red: #ef4444;
            --tkd-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: flex-start;
            justify-content: center;
        }

        /* 왼쪽 사이드바 */
        .sidebar-container {
            flex: 0 0 340px;
            background-color: var(--container-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-color);
            margin-top: 10px;
            position: sticky;
            top: 20px;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-container::-webkit-scrollbar { width: 4px; }
        .sidebar-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* 오른쪽 메인앱 */
        .app-container {
            flex: 1;
            max-width: 650px;
            background-color: var(--container-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-color);
            margin-top: 10px;
            margin-bottom: 30px;
            position: relative;
        }

        .app-container::before, .sidebar-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--tkd-blue) 50%, var(--tkd-red) 50%);
            border-radius: 20px 20px 0 0;
        }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column-reverse; align-items: center; }
            .sidebar-container { width: 100%; max-width: 650px; position: static; max-height: none; }
            .app-container { width: 100%; }
        }

        /* 공통 헤더 */
        .header { text-align: center; margin-bottom: 24px; padding-top: 12px; }
        .header h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
        .title-tkd { background: linear-gradient(90deg, #38bdf8, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 13px; color: var(--text-muted); }

        /* 파서 및 디스코드 영역 */
        .parser-container {
            background-color: rgba(255, 255, 255, 0.02);
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }
        .parser-label { font-size: 13px; font-weight: 700; color: var(--accent-blue); }
        .discord-btn {
            background-color: #5865F2; color: white; border: none; border-radius: 6px;
            padding: 6px 10px; font-size: 11px; font-weight: 700; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.1s;
        }
        .discord-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .parser-textarea {
            width: 100%; height: 90px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); color: var(--text-main);
            padding: 12px; border-radius: 10px; font-size: 14px; resize: none; outline: none; margin-top: 10px;
        }
        .parser-textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }

        /* 탭 디자인 */
        .tabs { display: table; width: 100%; background-color: var(--input-bg); padding: 4px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .tab-cell { display: table-cell; width: 50%; text-align: center; }
        .tab-btn { width: 100%; background: none; border: none; color: var(--text-muted); padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background-color: var(--container-bg); color: var(--text-main); border: 1px solid var(--border-color); }
        #tab-rune.active { color: var(--accent-blue); }
        #tab-cooking.active { color: var(--accent-amber); }

        .sub-tabs { display: flex; gap: 6px; margin-bottom: 20px; background-color: var(--input-bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border-color); }
        .sub-tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 8px 4px; font-size: 12px; font-weight: 700; cursor: pointer; border-radius: 6px; text-align: center; }
        .sub-tab-btn.active { background-color: var(--container-bg); color: var(--accent-amber); }

        /* 아이템 카드 */
        .item-card { background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
        .item-header { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .item-name { font-weight: 800; font-size: 16px; color: var(--text-main); }
        .item-recipe { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .tier-table { display: table; width: 100%; border-collapse: collapse; }
        .tier-row { display: table-row; }
        .tier-row + .tier-row .tier-cell { border-top: 1px dashed rgba(255, 255, 255, 0.05); }
        .tier-cell { display: table-cell; vertical-align: middle; padding: 8px 0; }
        .cell-label { width: 25%; font-size: 12px; }
        .star-badge { font-weight: 800; font-size: 12px; }
        .star-무별 { color: #e2e8f0; } .star-은별 { color: #94a3b8; } .star-금별 { color: #fbbf24; }
        .rune-badge { color: var(--accent-blue); }
        .range-text { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .cell-input { width: 25%; padding-right: 8px; }
        .cell-input input { width: 100%; background-color: var(--container-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 7px 8px; border-radius: 8px; font-size: 14px; outline: none; text-align: center; font-weight: 700; }
        .cell-input input:focus { border-color: var(--accent-blue); }
        
        .cell-result { width: 50%; text-align: right; font-size: 11px; display: flex; justify-content: flex-end; align-items: center; gap: 6px; }
        .status-badge { font-size: 11px; padding: 3px 7px; border-radius: 5px; font-weight: 700; }
        .status-perfect { background-color: rgba(74, 222, 128, 0.15); color: var(--accent-green); }
        .status-good { background-color: rgba(56, 189, 248, 0.15); color: var(--accent-blue); }
        .status-normal { background-color: rgba(251, 191, 36, 0.15); color: var(--accent-amber); }
        .status-bad { background-color: rgba(248, 113, 113, 0.15); color: var(--accent-red); }
        .status-none { background-color: transparent; color: var(--text-muted); }
        .diff-text { font-weight: 700; } .diff-good { color: var(--accent-green); } .diff-bad { color: var(--accent-red); } .diff-none { color: var(--text-muted); }

        .add-cart-btn { background-color: var(--tkd-blue); color: white; border: none; border-radius: 6px; width: 28px; height: 28px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .add-cart-btn:hover { background-color: #2563eb; transform: scale(1.05); }

        /* ---------- 사이드바 헤더 및 유틸리티 ---------- */
        .cart-header { font-size: 16px; font-weight: 900; margin-bottom: 12px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        
        .settings-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; transition: 0.2s; padding: 4px; border-radius: 4px; }
        .settings-btn:hover { color: var(--accent-amber); background: rgba(255,255,255,0.1); }

        .shop-alert-box {
            background-color: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
            transition: all 0.3s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        .shop-alert-title { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .shop-alert-msg { font-size: 15px; font-weight: 900; color: var(--text-muted); margin-bottom: 4px; }
        .shop-alert-sub { font-size: 12px; color: var(--text-muted); }

        .timer-dark-box {
            background-color: #0d1117; 
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .timer-dark-left { display: flex; flex-direction: column; gap: 4px; }
        .timer-dark-name { font-size: 13px; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .timer-dark-val {
            font-size: 26px;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .timer-dark-right { display: flex; gap: 8px; }
        
        .t-dark-btn { padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        .t-start { background-color: rgba(74, 222, 128, 0.1); color: var(--accent-green); }
        .t-start:hover { background-color: rgba(74, 222, 128, 0.2); }
        .t-stop { background-color: rgba(248, 113, 113, 0.05); color: #fca5a5; }
        .t-stop:hover { background-color: rgba(248, 113, 113, 0.15); color: var(--accent-red); }
        
        .timer-expired { animation: blinkRed 1s infinite; color: var(--accent-red) !important; text-shadow: 0 0 8px rgba(239, 68, 68, 0.6) !important; }
        @keyframes blinkRed { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .t-test-mini { position: absolute; top: 6px; right: 8px; font-size: 9px; background: none; border: none; color: var(--border-color); cursor: pointer; }
        .t-test-mini:hover { color: var(--accent-amber); }

        /* ---------- 장부 디자인 ---------- */
        .cart-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 20px 0; background: var(--input-bg); border-radius: 10px; border: 1px dashed var(--border-color); }
        .cart-item { background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .cart-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .cart-item-name { font-size: 13px; font-weight: 800; color: var(--text-main); max-width: 85%; }
        .cart-remove-btn { background: none; border: none; color: var(--accent-red); cursor: pointer; opacity: 0.7; }
        .cart-item-price { font-size: 12px; color: var(--accent-amber); font-weight: 700; }
        
        .qty-wrapper { display: flex; align-items: center; gap: 4px; }
        .qty-input, .cost-input { background-color: var(--container-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; text-align: center; font-size: 12px; font-weight: 700; outline: none; }
        .qty-input { width: 45px; padding: 4px; }
        .cost-input { width: 70px; padding: 4px; text-align: right; }
        .qty-btn { background-color: var(--border-color); color: var(--text-main); border: none; border-radius: 4px; padding: 4px 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background-color: #475569; }

        .item-profit { font-size: 12px; font-weight: 900; }
        
        .cart-total-box { margin-top: 16px; padding: 12px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; }
        .total-line { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; color: var(--text-muted); font-weight: 700;}
        .total-line.final { border-top: 2px dashed var(--border-color); margin-top: 8px; padding-top: 8px; font-size: 16px; font-weight: 900; color: var(--text-main); }

        /* ---------- 계산기 ---------- */
        .calculator-box { margin-top: 24px; background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .calc-display { width: 100%; background-color: var(--container-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 6px; font-size: 18px; font-weight: 700; text-align: right; margin-bottom: 10px; outline: none; font-family: monospace; }
        .calc-display:focus { border-color: var(--accent-green); box-shadow: 0 0 5px rgba(74, 222, 128, 0.3); }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-btn { background-color: var(--container-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 0; font-size: 15px; font-weight: 700; cursor: pointer; }
        .calc-btn:hover { background-color: #334155; }
        .calc-op { background-color: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border-color: rgba(56, 189, 248, 0.3); }
        .calc-eq { background-color: var(--accent-green); color: #000; border: none; }
        .calc-clear { background-color: rgba(248, 113, 113, 0.1); color: var(--accent-red); border-color: rgba(248, 113, 113, 0.3); }

        /* ---------- 모달 창 (사운드 설정) ---------- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--container-bg); border: 2px solid var(--border-color);
            border-radius: 12px; padding: 20px; width: 400px; max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }
        .modal-header h3 { font-size: 16px; margin: 0; color: var(--text-main); }
        .modal-header button { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; }
        .modal-header button:hover { color: var(--accent-red); }
        .sound-status { font-size: 14px; margin-bottom: 15px; }
        .sound-controls { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 왼쪽 사이드바 -->
    <div class="sidebar-container">
        
        <!-- 1. 마을 유틸리티 (블랙 에디션 스타일) -->
        <div class="cart-header">
            <div><i class="fa-solid fa-bell"></i> 마을 유틸리티</div>
            <button class="settings-btn" onclick="openSoundModal()" title="알림 사운드 커스텀"><i class="fa-solid fa-music"></i> 설정</button>
        </div>
        
        <!-- 변동상점 시세 갱신 박스 -->
        <div class="shop-alert-box" id="shopScheduleInfoBox">
            <div class="shop-alert-title"><i class="fa-solid fa-store"></i> 변동상점 시세 갱신</div>
            <div class="shop-alert-msg" id="shopAlertMsg">계산 중...</div>
            <div class="shop-alert-sub" id="shopAlertSub"></div>
        </div>

        <!-- 타이머: 호감도 -->
        <div class="timer-dark-box">
            <div class="timer-dark-left">
                <div class="timer-dark-name">💖 호감도 아이템</div>
                <div class="timer-dark-val" id="timer_affection">06:00:00</div>
            </div>
            <div class="timer-dark-right">
                <button class="t-dark-btn t-start" onclick="startAppTimer('affection', 21600)">시작</button>
                <button class="t-dark-btn t-stop" onclick="stopAppTimer('affection')">정지</button>
            </div>
            <button class="t-test-mini" onclick="startAppTimer('affection', 10)">10s</button>
        </div>

        <!-- 타이머: 농작물 -->
        <div class="timer-dark-box">
            <div class="timer-dark-left">
                <div class="timer-dark-name">🌱 농작물 재배</div>
                <div class="timer-dark-val" id="timer_crop">17:00</div>
            </div>
            <div class="timer-dark-right">
                <button class="t-dark-btn t-start" onclick="startAppTimer('crop', 1020)">시작</button>
                <button class="t-dark-btn t-stop" onclick="stopAppTimer('crop')">정지</button>
            </div>
            <button class="t-test-mini" onclick="startAppTimer('crop', 10)">10s</button>
        </div>

        <div style="height: 16px;"></div>

        <!-- 2. 예상 수익 장부 -->
        <div class="cart-header"><i class="fa-solid fa-wallet"></i> 예상 수익 장부</div>
        <div>
            <div id="cartItemsList"></div>
        </div>
        <div class="cart-total-box">
            <div class="total-line"><span>총 예상 매출</span><span id="sumRevenue">0원</span></div>
            <div class="total-line"><span style="color:var(--accent-red)">총 재료비</span><span id="sumCost" style="color:var(--accent-red)">- 0원</span></div>
            <div class="total-line final"><span>최종 순수익</span><span id="sumProfit" style="color:var(--accent-green);">0원</span></div>
        </div>

        <!-- 3. 퀵 재료비 계산기 -->
        <div class="calculator-box">
            <div class="cart-header" style="font-size: 14px; margin-bottom: 12px; border:none; padding-bottom:0;"><i class="fa-solid fa-calculator"></i> 퀵 재료비 계산기</div>
            <input type="text" id="calcDisplay" class="calc-display" placeholder="예: 30*3+15*2" onkeydown="handleCalcKey(event)">
            <div class="calc-grid">
                <button class="calc-btn" onclick="calcAppend('7')">7</button>
                <button class="calc-btn" onclick="calcAppend('8')">8</button>
                <button class="calc-btn" onclick="calcAppend('9')">9</button>
                <button class="calc-btn calc-op" onclick="calcAppend('+')">+</button>
                <button class="calc-btn" onclick="calcAppend('4')">4</button>
                <button class="calc-btn" onclick="calcAppend('5')">5</button>
                <button class="calc-btn" onclick="calcAppend('6')">6</button>
                <button class="calc-btn calc-op" onclick="calcAppend('-')">-</button>
                <button class="calc-btn" onclick="calcAppend('1')">1</button>
                <button class="calc-btn" onclick="calcAppend('2')">2</button>
                <button class="calc-btn" onclick="calcAppend('3')">3</button>
                <button class="calc-btn calc-op" onclick="calcAppend('*')">×</button>
                <button class="calc-btn calc-clear" onclick="calcClear()">C</button>
                <button class="calc-btn" onclick="calcAppend('0')">0</button>
                <button class="calc-btn calc-eq" onclick="calcCalculate()">=</button>
                <button class="calc-btn calc-op" onclick="calcAppend('/')">÷</button>
            </div>
        </div>

    </div>

    <!-- 오른쪽 메인 앱 (파서 + 리스트) -->
    <div class="app-container">
        <div class="header">
            <h1>🥋 <span class="title-tkd">태권도장 시세계산기</span></h1>
            <p>시세를 입력하고 우측 [+] 버튼을 눌러 장부에 기록하세요</p>
        </div>

        <!-- 통합 스마트 분석 영역 + 디스코드 버튼 -->
        <div class="parser-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <label class="parser-label" id="parserLabel" style="margin-bottom: 0;">📋 통합 시세 복사+붙여넣기</label>
                <div style="display: flex; gap: 8px;">
                    <a href="https://discord.com/channels/1207535228730474587/1362482704553214023" target="_blank" class="discord-btn" title="룬 변동상점 채널로 즉시 이동합니다.">
                        <i class="fa-brands fa-discord"></i> 룬 시세
                    </a>
                    <a href="https://discord.com/channels/1207535228730474587/1362843048098271475" target="_blank" class="discord-btn" style="background-color: #eb459e;" title="요리 변동상점 채널로 즉시 이동합니다.">
                        <i class="fa-brands fa-discord"></i> 요리 시세
                    </a>
                </div>
            </div>

    /* ---------------- 네비게이션 ---------------- */
    function switchTab(tab) {
        document.getElementById('tab-rune').classList.remove('active');
        document.getElementById('tab-cooking').classList.remove('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById('runeView').style.display = tab === 'rune' ? 'block' : 'none';
        document.getElementById('cookingView').style.display = tab === 'cooking' ? 'block' : 'none';
    }

    function switchSubTab(catKey) {
        ['c1', 'c2', 'c3', 'c4', 'c5'].forEach(k => {
            document.getElementById(`sub-tab-${k}`).classList.remove('active');
            document.getElementById(`section-container-${k}`).style.display = 'none';
        });
        document.getElementById(`sub-tab-${catKey}`).classList.add('active');
        document.getElementById(`section-container-${catKey}`).style.display = 'block';
    }

    /* ---------------- 렌더링 ---------------- */
    function renderRuneList() {
        const container = document.getElementById('runeListContainer');
        container.innerHTML = '';
        serverData.rune.forEach((rune, index) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <div class="item-header"><span class="item-name">${rune.name}</span><div class="item-recipe">안전 범위: ${rune.min} ~ ${rune.max}원</div></div>
                <div class="tier-table">
                    <div class="tier-row">
                        <div class="tier-cell cell-label"><span class="star-badge rune-badge">🔮 룬 단가</span></div>
                        <div class="tier-cell cell-input"><input type="number" id="rune_input_${index}" placeholder="단가" oninput="updateRune(${index})"></div>
                        <div class="tier-cell cell-result">
                            <span class="diff-text diff-none" id="rune_diff_${index}">-</span>
                            <span class="status-badge status-none" id="rune_status_${index}">-</span>
                            <button class="add-cart-btn" onclick="addToCart('rune', ${index}, 0, 0)" title="장부에 추가"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateRune(index) {
        const rune = serverData.rune[index];
        const inputVal = document.getElementById(`rune_input_${index}`).value;
        const diffEl = document.getElementById(`rune_diff_${index}`);
        const statusEl = document.getElementById(`rune_status_${index}`);

        if (!inputVal || isNaN(inputVal)) {
            diffEl.textContent = "-"; diffEl.className = "diff-text diff-none";
            statusEl.textContent = "-"; statusEl.className = "status-badge status-none";
            syncCartPrice(`rune_${index}_0_0`, 0); return;
        }

        const currentPrice = parseInt(inputVal);
        const diff = rune.max - currentPrice;
        const pct = ((diff / rune.max) * 100).toFixed(1);
        let pricePositionPct = rune.max !== rune.min ? ((currentPrice - rune.min) / (rune.max - rune.min)) * 100 : 0;

        diffEl.textContent = diff >= 0 ? `-${diff.toLocaleString()}원 (${pct}%)` : `+${Math.abs(diff).toLocaleString()}원 상회`;
        diffEl.className = (diff < 0 || pricePositionPct >= 60) ? "diff-text diff-good" : "diff-text diff-bad";

        statusEl.className = 'status-badge';
        if (pricePositionPct >= 90) { statusEl.textContent = '🔥 최적'; statusEl.classList.add('status-perfect'); }
        else if (pricePositionPct >= 60) { statusEl.textContent = '🟢 추천'; statusEl.classList.add('status-good'); }
        else if (pricePositionPct >= 30) { statusEl.textContent = '🟡 보통'; statusEl.classList.add('status-normal'); }
        else { statusEl.textContent = '❌ 비추'; statusEl.classList.add('status-bad'); }

        syncCartPrice(`rune_${index}_0_0`, currentPrice);
    }

    function renderCookingList() {
        const container = document.getElementById('cookingListContainer');
        container.innerHTML = '';

        Object.keys(serverData.cooking).forEach((catKey, catIdx) => {
            const sectionWrapper = document.createElement('div');
            sectionWrapper.id = `section-container-${catKey}`;
            sectionWrapper.style.display = (catKey === 'c1') ? 'block' : 'none';

            serverData.cooking[catKey].forEach((item, itemIdx) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                let tierHtml = '';
                item.tiers.forEach((tier, tierIdx) => {
                    tierHtml += `
                        <div class="tier-row">
                            <div class="tier-cell cell-label"><span class="star-badge star-${labels[tierIdx]}">★ ${labels[tierIdx]}</span></div>
                            <div class="tier-cell cell-input"><input type="number" id="cook_${catIdx}_${itemIdx}_${tierIdx}" placeholder="단가" oninput="updateCooking(${catIdx}, ${itemIdx}, ${tierIdx})"></div>
                            <div class="tier-cell cell-result">
                                <span class="diff-text diff-none" id="cook_diff_${catIdx}_${itemIdx}_${tierIdx}">-</span>
                                <span class="status-badge status-none" id="cook_status_${catIdx}_${itemIdx}_${tierIdx}">-</span>
                                <button class="add-cart-btn" onclick="addToCart('cook', ${catIdx}, ${itemIdx}, ${tierIdx})" title="장부에 추가"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                });
                card.innerHTML = `<div class="item-header"><span class="item-name">${item.name}</span><div class="item-recipe">재료: ${item.recipe}</div></div><div class="tier-table">${tierHtml}</div>`;
                sectionWrapper.appendChild(card);
            });
            container.appendChild(sectionWrapper);
        });
    }

    function updateCooking(catIdx, itemIdx, tierIdx) {
        const catKey = ['c1', 'c2', 'c3', 'c4', 'c5'][catIdx];
        const item = serverData.cooking[catKey][itemIdx];
        const tier = item.tiers[tierIdx];
        const inputVal = document.getElementById(`cook_${catIdx}_${itemIdx}_${tierIdx}`).value;
        const diffEl = document.getElementById(`cook_diff_${catIdx}_${itemIdx}_${tierIdx}`);
        const statusEl = document.getElementById(`cook_status_${catIdx}_${itemIdx}_${tierIdx}`);

        if (!inputVal || isNaN(inputVal)) {
            diffEl.textContent = "-"; diffEl.className = "diff-text diff-none";
            statusEl.textContent = "-"; statusEl.className = "status-badge status-none";
            syncCartPrice(`cook_${catIdx}_${itemIdx}_${tierIdx}`, 0); return;
        }

        const currentPrice = parseInt(inputVal);
        const diff = tier.max - currentPrice;
        const pct = ((diff / tier.max) * 100).toFixed(1);
        let pricePositionPct = tier.max !== tier.min ? ((currentPrice - tier.min) / (tier.max - tier.min)) * 100 : 0;

        diffEl.textContent = diff >= 0 ? `-${diff.toLocaleString()}원 (${pct}%)` : `+${Math.abs(diff).toLocaleString()}원 상회`;
        diffEl.className = (diff < 0 || pricePositionPct >= 60) ? "diff-text diff-good" : "diff-text diff-bad";

        statusEl.className = 'status-badge';
        if (pricePositionPct >= 90) { statusEl.textContent = '🔥 최적'; statusEl.classList.add('status-perfect'); }
        else if (pricePositionPct >= 60) { statusEl.textContent = '🟢 추천'; statusEl.classList.add('status-good'); }
        else if (pricePositionPct >= 30) { statusEl.textContent = '🟡 보통'; statusEl.classList.add('status-normal'); }
        else { statusEl.textContent = '❌ 비추'; statusEl.classList.add('status-bad'); }

        syncCartPrice(`cook_${catIdx}_${itemIdx}_${tierIdx}`, currentPrice);
    }

    /* ---------------- 장부(계산기) 관련 로직 ---------------- */
    function addToCart(type, groupIdx, itemIdx, tierIdx) {
        let key = `${type}_${groupIdx}_${itemIdx}_${tierIdx}`;
        let name = '', price = 0;

        if (type === 'rune') {
            name = serverData.rune[groupIdx].name;
            price = parseInt(document.getElementById(`rune_input_${groupIdx}`).value);
        } else {
            const catKey = ['c1', 'c2', 'c3', 'c4', 'c5'][groupIdx];
            name = `${serverData.cooking[catKey][itemIdx].name} (${labels[tierIdx]})`;
            price = parseInt(document.getElementById(`cook_${groupIdx}_${itemIdx}_${tierIdx}`).value);
        }

        if (!price || isNaN(price) || price <= 0) { alert("상점 단가가 입력되지 않았습니다."); return; }

        if (cart[key]) cart[key].qty += 1;
        else cart[key] = { name, price, qty: 1, cost: 0 };
        renderCart();
    }

    function updateCartQty(key, newQty) {
        if (!cart[key]) return;
        const qty = parseInt(newQty);
        cart[key].qty = (isNaN(qty) || qty < 1) ? 1 : qty;
        renderCart();
    }
    
    function addCartQty(key, amount) {
        if (!cart[key]) return;
        cart[key].qty += amount;
        if(cart[key].qty < 1) cart[key].qty = 1;
        renderCart();
    }

    function updateCartCost(key, newCost) {
        if (!cart[key]) return;
        const cost = parseInt(newCost);
        cart[key].cost = isNaN(cost) || cost < 0 ? 0 : cost;
        renderCart();
    }

    function removeCartItem(key) { delete cart[key]; renderCart(); }
    function syncCartPrice(key, newPrice) { if (cart[key]) { cart[key].price = newPrice; renderCart(); } }

    function renderCart() {
        const container = document.getElementById('cartItemsList');
        const keys = Object.keys(cart);
        let sumRev = 0, sumCost = 0, sumProfit = 0;

        if (keys.length === 0) {
            container.innerHTML = `<div class="cart-empty">우측의 [+] 버튼을 눌러<br>장부에 품목을 추가하세요.</div>`;
            document.getElementById('sumRevenue').textContent = "0원";
            document.getElementById('sumCost').textContent = "- 0원";
            document.getElementById('sumProfit').textContent = "0원";
            document.getElementById('sumProfit').style.color = "var(--accent-green)";
            return;
        }

        container.innerHTML = '';
        keys.forEach(key => {
            const item = cart[key];
            const rev = item.price * item.qty;
            const cost = item.cost * item.qty;
            const profit = rev - cost;
            
            sumRev += rev; sumCost += cost; sumProfit += profit;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-header">
                    <span class="cart-item-name">${item.name}</span>
                    <button class="cart-remove-btn" onclick="removeCartItem('${key}')"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span class="cart-item-price">단가: ${item.price.toLocaleString()}원</span>
                    <div class="qty-wrapper">
                        <button class="qty-btn" onclick="addCartQty('${key}', 1)">+1</button>
                        <button class="qty-btn" onclick="addCartQty('${key}', 64)">+64</button>
                        <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="updateCartQty('${key}', this.value)">
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px dashed rgba(255,255,255,0.1); padding-top:8px;">
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span style="font-size:11px; color:var(--accent-red); font-weight:700;">개당 재료비</span>
                        <input type="number" class="cost-input" value="${item.cost || ''}" placeholder="0" onchange="updateCartCost('${key}', this.value)">
                    </div>
                    <span class="item-profit" style="color: ${profit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">순수익: ${profit > 0 ? '+' : ''}${profit.toLocaleString()}원</span>
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('sumRevenue').textContent = `${sumRev.toLocaleString()}원`;
        document.getElementById('sumCost').textContent = `- ${sumCost.toLocaleString()}원`;
        const profitEl = document.getElementById('sumProfit');
        profitEl.textContent = `${sumProfit > 0 ? '+' : ''}${sumProfit.toLocaleString()}원`;
        profitEl.style.color = sumProfit >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
    }

    /* ---------------- 커스텀 알림음 IndexedDB 로직 ---------------- */
    let audioDB;
    let customAudioUrl = null;

    function initAudioDB() {
        const req = indexedDB.open("TkdAudioSettings", 1);
        req.onupgradeneeded = e => {
            audioDB = e.target.result;
            if (!audioDB.objectStoreNames.contains("sounds")) {
                audioDB.createObjectStore("sounds");
            }
        };
        req.onsuccess = e => {
            audioDB = e.target.result;
            loadCustomAudio(); // 페이지 로드 시 기존에 저장된 MP3 파일 불러오기
        };
        req.onerror = e => console.error("IndexedDB Error", e);
    }

    function handleAudioUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (audioDB) {
            const tx = audioDB.transaction("sounds", "readwrite");
            tx.objectStore("sounds").put(file, "userAlarm");
            tx.oncomplete = () => {
                loadCustomAudio();
                alert("알림음이 저장되었습니다! (새로고침을 해도 유지됩니다)");
            };
        }
    }

    function loadCustomAudio() {
        if (!audioDB) return;
        const tx = audioDB.transaction("sounds", "readonly");
        const req = tx.objectStore("sounds").get("userAlarm");
        req.onsuccess = e => {
            const file = e.target.result;
            if (file) {
                if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
                customAudioUrl = URL.createObjectURL(file);
                document.getElementById('currentSoundName').textContent = file.name;
            } else {
                document.getElementById('currentSoundName').textContent = "기본 띠로링 소리";
            }
        };
    }

    function clearCustomAudio() {
        if (!audioDB) return;
        const tx = audioDB.transaction("sounds", "readwrite");
        tx.objectStore("sounds").delete("userAlarm");
        tx.oncomplete = () => {
            if (customAudioUrl) URL.revokeObjectURL(customAudioUrl);
            customAudioUrl = null;
            document.getElementById('currentSoundName').textContent = "기본 띠로링 소리";
            document.getElementById('customAudioInput').value = "";
            alert("기본 알림음으로 초기화 되었습니다.");
        };
    }

    function openSoundModal() {
        document.getElementById('soundModal').style.display = 'flex';
    }
    
    function closeSoundModal() {
        document.getElementById('soundModal').style.display = 'none';
    }

    function testSound() {
        playAlarmSound();
    }

    function playAlarmSound() {
        if (customAudioUrl) {
            // 사용자가 업로드한 파일 재생
            const audio = new Audio(customAudioUrl);
            audio.play().catch(e => {
                console.log("사용자 오디오 재생 실패, 기본음으로 대체", e);
                playDefaultBeep();
            });
        } else {
            // 커스텀 사운드가 없으면 기본음
            playDefaultBeep();
        }
    }

    function playDefaultBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            function playNote(freq, startTime, duration) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                gain.gain.setValueAtTime(0.5, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                osc.stop(startTime + duration);
            }
            const now = audioCtx.currentTime;
            playNote(523.25, now, 0.5);       
            playNote(659.25, now + 0.15, 0.5); 
            playNote(783.99, now + 0.3, 1.0);  
        } catch(e) { console.log("Audio API 미지원 브라우저입니다."); }
    }

    /* ---------------- 타이머 및 상점 스케줄 로직 (블랙 에디션) ---------------- */
    let activeTimers = {};

    function initTimers() {
        ['affection', 'crop'].forEach(type => {
            const saved = localStorage.getItem('tkdTimer_' + type);
            if (saved) {
                const endTime = parseInt(saved, 10);
                if (endTime > Date.now()) startTimerLoop(type, endTime);
                else timerExpired(type);
            }
        });
        
        checkShopSchedule();
        setInterval(checkShopSchedule, 60000); 
    }

    function startAppTimer(type, seconds) {
        if (activeTimers[type]) {
            if (!confirm("타이머가 이미 작동 중입니다. 새로 재시작할까요?")) return;
        }
        const endTime = Date.now() + (seconds * 1000);
        localStorage.setItem('tkdTimer_' + type, endTime.toString());
        startTimerLoop(type, endTime);
    }

    function stopAppTimer(type) {
        if (activeTimers[type]) clearInterval(activeTimers[type]);
        activeTimers[type] = null;
        localStorage.removeItem('tkdTimer_' + type);
        
        const el = document.getElementById('timer_' + type);
        el.classList.remove('timer-expired');
        if (type === 'affection') el.textContent = "06:00:00";
        if (type === 'crop') el.textContent = "17:00";
    }

    function startTimerLoop(type, endTime) {
        if (activeTimers[type]) clearInterval(activeTimers[type]);
        document.getElementById('timer_' + type).classList.remove('timer-expired');
        
        updateTimerDisplay(type, endTime);
        activeTimers[type] = setInterval(() => updateTimerDisplay(type, endTime), 1000);
    }

    function updateTimerDisplay(type, endTime) {
        const diff = endTime - Date.now();
        if (diff <= 0) {
            timerExpired(type);
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        const el = document.getElementById('timer_' + type);
        if (type === 'affection') {
            el.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        } else {
            el.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
    }

    function timerExpired(type) {
        if (activeTimers[type]) clearInterval(activeTimers[type]);
        activeTimers[type] = null;
        localStorage.removeItem('tkdTimer_' + type);
        
        const el = document.getElementById('timer_' + type);
        el.classList.add('timer-expired');
        if (type === 'affection') el.textContent = "00:00:00";
        if (type === 'crop') el.textContent = "00:00";

        playAlarmSound(); 
        
        const name = type === 'affection' ? '호감도 템' : '농작물 재배';
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(`⏰ [${name}] 완료!`, { body: "시간이 다 되었습니다. 게임을 확인하세요." });
        }
        
        setTimeout(() => alert(`⏰ [${name}] 완료되었습니다!`), 100);
    }

    function checkShopSchedule() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        
        let nextHour = Math.ceil(h / 3) * 3;
        if (nextHour === h && m > 0) nextHour += 3;
        
        let isChangedNow = (h % 3 === 0 && m < 15); 
        
        const box = document.getElementById('shopScheduleInfoBox');
        const msg = document.getElementById('shopAlertMsg');
        const sub = document.getElementById('shopAlertSub');
        
        if (isChangedNow) {
            box.style.borderColor = "rgba(239, 68, 68, 0.5)";
            box.style.backgroundColor = "rgba(239, 68, 68, 0.08)";
            msg.textContent = "🔥 방금 시세가 변동되었습니다!";
            msg.style.color = "var(--accent-red)";
            sub.textContent = `(${m}분 전 갱신 완료 / 다음 갱신: ${nextHour >= 24 ? nextHour - 24 : nextHour}시)`;
            sub.style.color = "#fca5a5";
        } else {
            box.style.borderColor = "var(--border-color)";
            box.style.backgroundColor = "rgba(0, 0, 0, 0.2)";
            msg.textContent = "⏳ 변동상점 시세 유지중";
            msg.style.color = "var(--text-muted)";
            
            const nextHDisplay = nextHour >= 24 ? nextHour - 24 : nextHour;
            const leftH = nextHour - h - (m > 0 ? 1 : 0);
            const leftM = m > 0 ? 60 - m : 0;
            sub.textContent = `(다음 갱신까지 ${leftH}시간 ${leftM}분 / ${nextHDisplay}시)`;
            sub.style.color = "var(--text-muted)";
        }
    }

    /* ---------------- 퀵 계산기 로직 ---------------- */
    function calcAppend(val) {
        const display = document.getElementById('calcDisplay');
        display.value += val;
        display.focus();
    }
    function calcClear() { document.getElementById('calcDisplay').value = ''; }
    function calcCalculate() {
        const display = document.getElementById('calcDisplay');
        try {
            let safeExpr = display.value.replace(/x|X|×/g, '*').replace(/÷/g, '/');
            safeExpr = safeExpr.replace(/[^0-9+\-*/.()]/g, ''); 
            if (safeExpr) {
                let result = new Function('return ' + safeExpr)();
                display.value = Math.round(result);
            }
        } catch (e) {}
    }
    function handleCalcKey(e) { if (e.key === 'Enter') calcCalculate(); }

    /* ---------------- 강력한 스마트 파서 (정규식) ---------------- */
    function handleSmartParse() {
        const rawText = document.getElementById('smartParser').value;
        if (!rawText.trim()) return;

        const regex = /\[([^\]]+)\]\s*\|\s*\d+\s*→\s*(\d+)/g;
        let match, matchCount = 0;

        while ((match = regex.exec(rawText)) !== null) {
            matchCount++;
            let itemNameRaw = match[1].trim(); 
            let price = parseInt(match[2], 10); 
            let normalizedInput = itemNameRaw.replace(/\s+/g, '');

            serverData.rune.forEach((rune, index) => {
                let matched = false;
                rune.keywords.forEach(kw => { if (normalizedInput.includes(kw.replace(/\s+/g, ''))) matched = true; });
                if (matched) {
                    const inputEl = document.getElementById(`rune_input_${index}`);
                    if(inputEl) { inputEl.value = price; updateRune(index); }
                }
            });

            Object.keys(serverData.cooking).forEach((groupName, groupIdx) => {
                serverData.cooking[groupName].forEach((item, itemIdx) => {
                    let itemMatched = false;
                    item.keywords.forEach(kw => { if (normalizedInput.includes(kw.replace(/\s+/g, ''))) itemMatched = true; });

                    if (itemMatched) {
                        let bestTierIdx = 0, minDistance = Infinity;
                        item.tiers.forEach((t, tIdx) => {
                            let distance = Math.abs(price - ((t.min + t.max) / 2));
                            if (distance < minDistance) { minDistance = distance; bestTierIdx = tIdx; }
                        });
                        const inputEl = document.getElementById(`cook_${groupIdx}_${itemIdx}_${bestTierIdx}`);
                        if (inputEl) { inputEl.value = price; updateCooking(groupIdx, itemIdx, bestTierIdx); }
                    }
                });
            });
        }

        if (matchCount === 0) {
            const lines = rawText.split(/[\n\,\/|]+/);
            lines.forEach(line => {
                const trimmedLine = line.trim().replace(/\s+/g, ' ');
                if (!trimmedLine) return;
                const numMatch = trimmedLine.match(/\d+/);
                if (!numMatch) return;
                const price = parseInt(numMatch[0]);

                serverData.rune.forEach((rune, index) => {
                    let matched = false;
                    rune.keywords.forEach(kw => { if (trimmedLine.includes(kw)) matched = true; });
                    if (matched) {
                        const inputEl = document.getElementById(`rune_input_${index}`);
                        if(inputEl) { inputEl.value = price; updateRune(index); }
                    }
                });

                Object.keys(serverData.cooking).forEach((groupName, groupIdx) => {
                    serverData.cooking[groupName].forEach((item, itemIdx) => {
                        let itemMatched = false;
                        item.keywords.forEach(kw => { if (trimmedLine.includes(kw)) itemMatched = true; });

                        if (itemMatched) {
                            let tierIdx = -1;
                            if (trimmedLine.includes('은별') || trimmedLine.includes('은')) tierIdx = 1;
                            else if (trimmedLine.includes('금별') || trimmedLine.includes('금')) tierIdx = 2;
                            else if (trimmedLine.includes('무별') || trimmedLine.includes('무')) tierIdx = 0;

                            if (tierIdx === -1) {
                                let bestTierIdx = 0, minDistance = Infinity;
                                item.tiers.forEach((t, tIdx) => {
                                    let distance = Math.abs(price - ((t.min + t.max) / 2));
                                    if (distance < minDistance) { minDistance = distance; bestTierIdx = tIdx; }
                                });
                                tierIdx = bestTierIdx;
                            }
                            const inputEl = document.getElementById(`cook_${groupIdx}_${itemIdx}_${tierIdx}`);
                            if (inputEl) { inputEl.value = price; updateCooking(groupIdx, itemIdx, tierIdx); }
                        }
                    });
                });
            });
        }
    }

    window.onload = init;
</script>
