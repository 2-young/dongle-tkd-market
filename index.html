<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥋 태권도장 마스터 시스템 v1.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: #151d30;
            --input-bg: #0b0f19;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --accent-blue: #38bdf8;
            --border-color: #1e293b;
            --tkd-red: #ef4444;
            --tkd-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 960px;
            margin: 0 auto;
            align-items: flex-start;
            justify-content: center;
        }

        .sidebar-container {
            flex: 0 0 320px;
            background-color: var(--container-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-color);
            margin-top: 10px;
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .app-container {
            flex: 1;
            max-width: 600px;
            background-color: var(--container-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 2px solid var(--border-color);
            margin-top: 10px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .app-container::before, .sidebar-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--tkd-blue) 50%, var(--tkd-red) 50%);
        }

        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column-reverse;
                align-items: center;
            }
            .sidebar-container {
                width: 100%;
                max-width: 600px;
                position: static;
                max-height: none;
            }
            .app-container {
                width: 100%;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .title-tkd {
            background: linear-gradient(90deg, #38bdf8, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .parser-container {
            background-color: rgba(255, 255, 255, 0.02);
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }

        .parser-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .parser-textarea {
            width: 100%;
            height: 100px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            resize: none;
            outline: none;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
            line-height: 1.6;
            font-weight: 500;
        }

        .parser-textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2), inset 0 1px 4px rgba(0,0,0,0.5);
        }

        .tabs {
            display: table;
            width: 100%;
            background-color: var(--input-bg);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .tab-cell {
            display: table-cell;
            width: 50%;
            text-align: center;
        }

        .tab-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--container-bg);
            color: var(--text-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }
        
        #tab-rune.active { color: var(--accent-blue); }
        #tab-cooking.active { color: var(--accent-amber); }

        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background-color: var(--input-bg);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .sub-tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            transition: all 0.2s;
        }

        .sub-tab-btn.active {
            background-color: var(--container-bg);
            color: var(--accent-amber);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .item-card {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
        }

        .item-card:hover {
            border-color: #334155;
        }
        
        .item-header {
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        
        .item-name {
            font-weight: 800;
            font-size: 16px;
            color: var(--text-main);
        }
        
        .item-recipe {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .tier-table {
            display: table;
            width: 100%;
            border-collapse: collapse;
        }

        .tier-row {
            display: table-row;
        }

        .tier-row + .tier-row .tier-cell {
            border-top: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .tier-cell {
            display: table-cell;
            vertical-align: middle;
            padding: 8px 0;
        }

        .cell-label {
            width: 25%;
            font-size: 12px;
        }

        .star-badge {
            font-weight: 800;
            font-size: 12px;
        }
        .star-무별 { color: #e2e8f0; }
        .star-은별 { color: #94a3b8; }
        .star-금별 { color: #fbbf24; text-shadow: 0 0 6px rgba(251,191,36,0.3); }
        .rune-badge { color: var(--accent-blue); text-shadow: 0 0 6px rgba(56,189,248,0.3); }

        .range-text {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .cell-input {
            width: 25%;
            padding-right: 8px;
        }
        
        .cell-input input {
            width: 100%;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            text-align: center;
            font-weight: 700;
        }

        .cell-input input:focus { border-color: var(--accent-blue); }
        
        .cell-result {
            width: 50%;
            text-align: right;
            font-size: 11px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            font-size: 11px;
            padding: 3px 7px;
            border-radius: 5px;
            font-weight: 700;
            display: inline-block;
        }
        .status-perfect { background-color: rgba(74, 222, 128, 0.15); color: var(--accent-green); }
        .status-good { background-color: rgba(56, 189, 248, 0.15); color: var(--accent-blue); }
        .status-normal { background-color: rgba(251, 191, 36, 0.15); color: var(--accent-amber); }
        .status-bad { background-color: rgba(248, 113, 113, 0.15); color: var(--accent-red); }
        .status-none { background-color: transparent; color: var(--text-muted); }

        .diff-text { font-weight: 700; }
        .diff-good { color: var(--accent-green); }
        .diff-bad { color: var(--accent-red); }
        .diff-none { color: var(--text-muted); }

        .add-cart-btn {
            background-color: var(--tkd-blue);
            color: white;
            border: none;
            border-radius: 6px;
            width: 26px;
            height: 26px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }
        .add-cart-btn:hover { background-color: #2563eb; transform: scale(1.05); }
        .add-cart-btn:active { transform: scale(0.95); }

        .cart-header {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-empty {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            padding: 30px 0;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px dashed var(--border-color);
        }

        .cart-item {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .cart-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .cart-item-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            word-break: keep-all;
            line-height: 1.3;
            max-width: 85%;
        }

        .cart-remove-btn {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
        }
        .cart-remove-btn:hover { opacity: 1; }

        .cart-item-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-price {
            font-size: 12px;
            color: var(--accent-amber);
            font-weight: 700;
        }

        .cart-qty-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .qty-input {
            width: 50px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            outline: none;
        }
        .qty-input:focus { border-color: var(--accent-blue); }

        .qty-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .qty-btn:hover { background-color: var(--tkd-blue); color: white; border-color: var(--tkd-blue); }

        .cost-row {
            border-top: 1px dashed rgba(255,255,255,0.05);
            padding-top: 8px;
            margin-top: 4px;
        }
        
        .cost-input-wrapper { display: flex; align-items: center; gap: 6px; }
        .cost-input-wrapper span { font-size: 11px; color: var(--accent-red); font-weight: 700; }
        .cost-input { width: 70px; }
        
        .item-profit { font-size: 13px; font-weight: 800; }
        .profit-good { color: var(--accent-green); }
        .profit-bad { color: var(--accent-red); }

        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 700;
        }
        .cart-summary-row.total-profit {
            border-top: 2px dashed var(--border-color);
            padding-top: 12px;
            margin-top: 12px;
            margin-bottom: 0;
        }
        .cart-summary-row.total-profit span:first-child {
            font-weight: 900;
            color: var(--text-main);
            font-size: 16px;
        }
        .cart-summary-row.total-profit .cart-summary-value {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-green);
        }
        .text-red { color: var(--accent-red) !important; }

        .cart-total-box {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px dashed var(--border-color);
            text-align: right;
            background: linear-gradient(180deg, transparent, rgba(56, 189, 248, 0.05));
            border-radius: 0 0 10px 10px;
        }

        .utility-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }
        .utility-header {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .shop-status-box {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .shop-status-box.shop-refreshed {
            background: rgba(248, 113, 113, 0.15);
            border-color: var(--accent-red);
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(248, 113, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); }
        }
        
        .shop-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }
        .shop-time {
            font-size: 14px;
            color: var(--accent-blue);
            line-height: 1.4;
        }
        .shop-refreshed .shop-time {
            color: var(--accent-red);
        }

        .timer-item {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .timer-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
        }
        .timer-val {
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }
        .timer-val.expired {
            color: var(--accent-red);
            animation: blink-text 1s infinite;
        }
        @keyframes blink-text { 50% { opacity: 0.3; } }
        
        .timer-controls {
            display: flex;
            gap: 6px;
        }
        .t-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .t-start {
            background-color: rgba(74, 222, 128, 0.15);
            color: var(--accent-green);
        }
        .t-start:hover { background-color: rgba(74, 222, 128, 0.3); }
        .t-stop {
            background-color: rgba(248, 113, 113, 0.1);
            color: var(--text-muted);
        }
        .t-stop:hover { background-color: rgba(248, 113, 113, 0.3); color: var(--accent-red); }

        .calc-container {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }
        .calc-header {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .calc-display {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: right;
            font-family: 'Orbitron', monospace, sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 12px;
            overflow-x: auto;
            white-space: nowrap;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .calc-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 0;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
        }
        .calc-btn:hover { background-color: #1e293b; }
        .calc-btn:active { transform: scale(0.95); }
        .calc-btn.op { background-color: rgba(56, 189, 248, 0.1); color: var(--accent-blue); border-color: rgba(56, 189, 248, 0.3); }
        .calc-btn.op:hover { background-color: rgba(56, 189, 248, 0.2); }
        .calc-btn.clear { color: var(--accent-red); }
        .calc-btn.equal { background-color: var(--tkd-blue); color: white; border: none; }
        .calc-btn.equal:hover { background-color: #2563eb; }
        
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 왼쪽 사이드바 (장부, 유틸리티, 계산기) -->
    <div class="sidebar-container">
        <div class="cart-header">💰 예상 수익 장부</div>
        <div id="cartItemsList"></div>
        <div class="cart-total-box">
            <div class="cart-summary-row">
                <span>총 예상 매출</span>
                <span id="cartTotalRev" style="color: var(--text-main);">0원</span>
            </div>
            <div class="cart-summary-row">
                <span class="text-red">총 재료비</span>
                <span class="text-red" id="cartTotalCost">- 0원</span>
            </div>
            <div class="cart-summary-row total-profit">
                <span>총 순수익</span>
                <span class="cart-summary-value" id="cartTotalProfit">0원</span>
            </div>
        </div>

        <!-- 마을 유틸리티 (변동상점 및 타이머) -->
        <div class="utility-section">
            <div class="utility-header"><i class="fa-solid fa-bell"></i> 마을 유틸리티</div>
            
            <div class="shop-status-box" id="shopStatusBox">
                <div class="shop-title"><i class="fa-solid fa-store"></i> 변동상점 시세 갱신</div>
                <div class="shop-time" id="shopTimeText">계산 중...</div>
            </div>

            <div class="timer-item">
                <div class="timer-info">
                    <span class="timer-name">💖 호감도 아이템</span>
                    <span class="timer-val" id="timer_affection">06:00:00</span>
                </div>
                <div class="timer-controls">
                    <button class="t-btn t-start" onclick="startAppTimer('affection', 21600)">시작</button>
                    <button class="t-btn t-stop" onclick="stopAppTimer('affection')">정지</button>
                </div>
            </div>

            <div class="timer-item">
                <div class="timer-info">
                    <span class="timer-name">🌱 농작물 재배</span>
                    <span class="timer-val" id="timer_crop">17:00</span>
                </div>
                <div class="timer-controls">
                    <button class="t-btn t-start" onclick="startAppTimer('crop', 1020)">시작</button>
                    <button class="t-btn t-stop" onclick="stopAppTimer('crop')">정지</button>
                </div>
            </div>
        </div>

        <!-- 퀵 재료비 계산기 -->
        <div class="calc-container">
            <div class="calc-header"><i class="fa-solid fa-calculator"></i> 퀵 재료비 계산기</div>
            <div class="calc-display" id="calcDisplay">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="calcNum(7)">7</button>
                <button class="calc-btn" onclick="calcNum(8)">8</button>
                <button class="calc-btn" onclick="calcNum(9)">9</button>
                <button class="calc-btn op" onclick="calcOp('/')">÷</button>
                
                <button class="calc-btn" onclick="calcNum(4)">4</button>
                <button class="calc-btn" onclick="calcNum(5)">5</button>
                <button class="calc-btn" onclick="calcNum(6)">6</button>

    function updateRune(index) {
        const rune = serverData.rune[index];
        const inputVal = document.getElementById(`rune_input_${index}`).value;
        const diffEl = document.getElementById(`rune_diff_${index}`);
        const statusEl = document.getElementById(`rune_status_${index}`);

        if (!inputVal || isNaN(inputVal) || inputVal < 0) {
            diffEl.textContent = "-";
            diffEl.className = "diff-text diff-none";
            statusEl.textContent = "-";
            statusEl.className = "status-badge status-none";
            syncCartPrice(`rune_${index}_0_0`, 0); 
            return;
        }

        const currentPrice = parseInt(inputVal);
        const diff = rune.max - currentPrice;
        const pct = ((diff / rune.max) * 100).toFixed(1);
        
        let pricePositionPct = 0;
        if (rune.max !== rune.min) {
            pricePositionPct = ((currentPrice - rune.min) / (rune.max - rune.min)) * 100;
        }

        if (diff >= 0) {
            diffEl.textContent = `-${diff.toLocaleString()}원 (${pct}%)`;
            diffEl.className = pricePositionPct >= 60 ? "diff-text diff-good" : "diff-text diff-bad";
        } else {
            diffEl.textContent = `+${Math.abs(diff).toLocaleString()}원 상회`;
            diffEl.className = "diff-text diff-good";
        }

        statusEl.className = 'status-badge';
        if (pricePositionPct >= 90) {
            statusEl.textContent = '🔥 최적';
            statusEl.classList.add('status-perfect');
        } else if (pricePositionPct >= 60) {
            statusEl.textContent = '🟢 추천';
            statusEl.classList.add('status-good');
        } else if (pricePositionPct >= 30) {
            statusEl.textContent = '🟡 보통';
            statusEl.classList.add('status-normal');
        } else {
            statusEl.textContent = '❌ 비추';
            statusEl.classList.add('status-bad');
        }
        syncCartPrice(`rune_${index}_0_0`, currentPrice);
    }

        let key = `${type}_${groupIdx}_${itemIdx}_${tierIdx}`;
        let name = '';
        let price = 0;

        if (type === 'rune') {
            name = serverData.rune[groupIdx].name;
            const inputVal = document.getElementById(`rune_input_${groupIdx}`).value;
            price = parseInt(inputVal);
        } else {
            const catKey = ['c1', 'c2', 'c3', 'c4', 'c5'][groupIdx];
            const item = serverData.cooking[catKey][itemIdx];
            name = `${item.name} (${labels[tierIdx]})`;
            const inputVal = document.getElementById(`cook_${groupIdx}_${itemIdx}_${tierIdx}`).value;
            price = parseInt(inputVal);
        }

        if (!price || isNaN(price) || price <= 0) {
            alert("먼저 상점 단가를 입력하거나 파서를 통해 기입해주세요!");
            return;
        }

        if (cart[key]) cart[key].qty += 1;
        else cart[key] = { name, price, qty: 1, materialCost: 0 };
        renderCart();
    }

    function addCartQty(key, amount) {
        if (!cart[key]) return;
        cart[key].qty += amount;
        if (cart[key].qty < 1) cart[key].qty = 1;
        renderCart();
    }

    function updateMaterialCost(key, cost) {
        if (!cart[key]) return;
        let val = parseInt(cost);
        if (isNaN(val) || val < 0) val = 0;
        cart[key].materialCost = val;
        renderCart();
    }

    function updateCartQty(key, newQty) {
        if (!cart[key]) return;
        const qty = parseInt(newQty);
        if (isNaN(qty) || qty < 1) cart[key].qty = 1;
        else cart[key].qty = qty;
        renderCart();
    }

    function removeCartItem(key) {
        delete cart[key];
        renderCart();
    }

    function syncCartPrice(key, newPrice) {
        if (cart[key]) {
            cart[key].price = newPrice;
            renderCart();
        }
    }

    function renderCart() {
        const container = document.getElementById('cartItemsList');
        const revContainer = document.getElementById('cartTotalRev');
        const costContainer = document.getElementById('cartTotalCost');
        const profitContainer = document.getElementById('cartTotalProfit');
        container.innerHTML = '';

        let keys = Object.keys(cart);
        let totalRev = 0;
        let totalCost = 0;
        let totalProfit = 0;

        if (keys.length === 0) {
            container.innerHTML = `<div class="cart-empty">리스트 우측의 [+] 버튼을 눌러<br>판매할 품목을 담아주세요.</div>`;
            revContainer.textContent = "0원";
            costContainer.textContent = "- 0원";
            profitContainer.textContent = "0원";
            profitContainer.style.color = 'var(--accent-green)';
            return;
        }

        keys.forEach(key => {
            const item = cart[key];
            const itemRev = item.price * item.qty;
            const itemCost = item.materialCost * item.qty;
            const itemProfit = itemRev - itemCost;
            
            totalRev += itemRev;
            totalCost += itemCost;
            totalProfit += itemProfit;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-header">
                    <span class="cart-item-name">${item.name}</span>
                    <button class="cart-remove-btn" onclick="removeCartItem('${key}')"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="cart-item-controls" style="margin-bottom: 8px;">
                    <span class="cart-item-price">단가: ${item.price.toLocaleString()}원</span>
                    <div class="cart-qty-wrapper">
                        <button class="qty-btn" onclick="addCartQty('${key}', 1)">+1</button>
                        <button class="qty-btn" onclick="addCartQty('${key}', 64)">+64</button>
                        <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="updateCartQty('${key}', this.value)">
                    </div>
                </div>
                <div class="cart-item-controls cost-row">
                    <div class="cost-input-wrapper">
                        <span>개당 재료비</span>
                        <input type="number" class="qty-input cost-input" placeholder="0" value="${item.materialCost === 0 ? '' : item.materialCost}" onchange="updateMaterialCost('${key}', this.value)">
                    </div>
                    <div class="item-profit ${itemProfit >= 0 ? 'profit-good' : 'profit-bad'}">
                        ${itemProfit >= 0 ? '+' : ''}${itemProfit.toLocaleString()}원
                    </div>
                </div>
            `;
            container.appendChild(div);
        });

        revContainer.textContent = `${totalRev.toLocaleString()}원`;
        costContainer.textContent = `- ${totalCost.toLocaleString()}원`;
        profitContainer.textContent = `${totalProfit > 0 ? '+' : ''}${totalProfit.toLocaleString()}원`;
        
        if (totalProfit < 0) profitContainer.style.color = 'var(--accent-red)';
        else profitContainer.style.color = 'var(--accent-green)';
    }

    function handleSmartParse() {
        const rawText = document.getElementById('smartParser').value;
        if (!rawText.trim()) return;

        const regex = /\[([^\]]+)\]\s*\|\s*\d+\s*→\s*(\d+)/g;
        let match;
        let matchCount = 0;

        while ((match = regex.exec(rawText)) !== null) {
            matchCount++;
            let itemNameRaw = match[1].trim(); 
            let price = parseInt(match[2], 10); 
            let normalizedInput = itemNameRaw.replace(/\s+/g, '');

            serverData.rune.forEach((rune, index) => {
                let matched = false;
                rune.keywords.forEach(kw => {
                    if (normalizedInput.includes(kw.replace(/\s+/g, ''))) matched = true;
                });
                if (matched) {
                    const inputEl = document.getElementById(`rune_input_${index}`);
                    if(inputEl) { inputEl.value = price; updateRune(index); }
                }
            });

            Object.keys(serverData.cooking).forEach((groupName, groupIdx) => {
                serverData.cooking[groupName].forEach((item, itemIdx) => {
                    let itemMatched = false;
                    item.keywords.forEach(kw => {
                        if (normalizedInput.includes(kw.replace(/\s+/g, ''))) itemMatched = true;
                    });
                    if (itemMatched) {
                        let bestTierIdx = 0, minDistance = Infinity;
                        item.tiers.forEach((t, tIdx) => {
                            let centerPrice = (t.min + t.max) / 2;
                            let distance = Math.abs(price - centerPrice);
                            if (distance < minDistance) { minDistance = distance; bestTierIdx = tIdx; }
                        });
                        const inputEl = document.getElementById(`cook_${groupIdx}_${itemIdx}_${bestTierIdx}`);
                        if (inputEl) { inputEl.value = price; updateCooking(groupIdx, itemIdx, bestTierIdx); }
                    }
                });
            });
        }

        if (matchCount === 0) {
            const lines = rawText.split(/[\n\,\/|]+/);
            lines.forEach(line => {
                const trimmedLine = line.trim().replace(/\s+/g, ' ');
                if (!trimmedLine) return;

                const numMatch = trimmedLine.match(/\d+/);
                if (!numMatch) return;
                const price = parseInt(numMatch[0]);

                serverData.rune.forEach((rune, index) => {
                    let matched = false;
                    rune.keywords.forEach(kw => { if (trimmedLine.includes(kw)) matched = true; });
                    if (matched) {
                        const inputEl = document.getElementById(`rune_input_${index}`);
                        if(inputEl) { inputEl.value = price; updateRune(index); }
                    }
                });

                Object.keys(serverData.cooking).forEach((groupName, groupIdx) => {
                    serverData.cooking[groupName].forEach((item, itemIdx) => {
                        let itemMatched = false;
                        item.keywords.forEach(kw => { if (trimmedLine.includes(kw)) itemMatched = true; });
                        if (itemMatched) {
                            let tierIdx = -1;
                            if (trimmedLine.includes('은별') || trimmedLine.includes('은')) tierIdx = 1;
                            else if (trimmedLine.includes('금별') || trimmedLine.includes('금')) tierIdx = 2;
                            else if (trimmedLine.includes('무별') || trimmedLine.includes('무')) tierIdx = 0;

                            if (tierIdx === -1) {
                                let bestTierIdx = 0, minDistance = Infinity;
                                item.tiers.forEach((t, tIdx) => {
                                    let centerPrice = (t.min + t.max) / 2;
                                    let distance = Math.abs(price - centerPrice);
                                    if (distance < minDistance) { minDistance = distance; bestTierIdx = tIdx; }
                                });
                                tierIdx = bestTierIdx;
                            }

                            const inputEl = document.getElementById(`cook_${groupIdx}_${itemIdx}_${tierIdx}`);
                            if (inputEl) { inputEl.value = price; updateCooking(groupIdx, itemIdx, tierIdx); }
                        }
                    });
                });
            });
        }
    }

    let calcCurrent = '0';
    let calcPrev = '';
    let calcOperator = null;

    function updateCalcDisplay() {
        const displayVal = calcCurrent === 'Error' ? 'Error' : Number(calcCurrent).toLocaleString();
        document.getElementById('calcDisplay').textContent = displayVal;
    }

    function calcNum(num) {
        if (calcCurrent === '0' || calcCurrent === 'Error') calcCurrent = num.toString();
        else if (calcCurrent.length < 15) calcCurrent += num.toString();
        updateCalcDisplay();
    }

    function calcOp(op) {
        if (calcCurrent === 'Error') return;
        if (calcOperator !== null && calcCurrent !== '0') calcEqual();
        calcPrev = calcCurrent;
        calcCurrent = '0';
        calcOperator = op;
    }

    function calcEqual() {
        if (calcOperator === null || calcPrev === '' || calcCurrent === 'Error') return;
        let result = 0;
        const prev = parseFloat(calcPrev);
        const current = parseFloat(calcCurrent);
        switch (calcOperator) {
            case '+': result = prev + current; break;
            case '-': result = prev - current; break;
            case '*': result = prev * current; break;
            case '/': 
                if (current === 0) { calcCurrent = 'Error'; updateCalcDisplay(); return; }
                result = prev / current; break;
        }
        calcCurrent = Math.round(result).toString(); 
        calcOperator = null; calcPrev = '';
        updateCalcDisplay();
    }

    function calcClear() {
        calcCurrent = '0'; calcPrev = ''; calcOperator = null;
        updateCalcDisplay();
    }

    // --- Web Audio & Notification API ---
    let audioCtx = null;
    function initAudioAndNotification() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    function playAlarmSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        function playNote(freq, startTime, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            gain.gain.setValueAtTime(0.5, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            osc.stop(startTime + duration);
        }
        playNote(523.25, now, 0.5);       // C5
        playNote(659.25, now + 0.15, 0.5); // E5
        playNote(783.99, now + 0.3, 1.0);  // G5
    }

    function showNotification(title, msg) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { body: msg, icon: "🥋" });
        }
    }

    // --- Timer System ---
    const timerDefs = {
        affection: { key: 'tkd_timer_affection', displayId: 'timer_affection', defaultVal: '06:00:00', label: '호감도 아이템' },
        crop: { key: 'tkd_timer_crop', displayId: 'timer_crop', defaultVal: '17:00', label: '농작물 재배' }
    };
    let timerNotified = { affection: false, crop: false };

    function startAppTimer(type, durationSecs) {
        initAudioAndNotification();
        const endTime = Date.now() + (durationSecs * 1000);
        localStorage.setItem(timerDefs[type].key, endTime);
        timerNotified[type] = false;
        
        const el = document.getElementById(timerDefs[type].displayId);
        el.classList.remove('expired');
        utilityLoop(); // 즉시 업데이트
    }

    function stopAppTimer(type) {
        localStorage.removeItem(timerDefs[type].key);
        const el = document.getElementById(timerDefs[type].displayId);
        el.textContent = timerDefs[type].defaultVal;
        el.classList.remove('expired');
        timerNotified[type] = false;
    }

    function formatTime(totalSeconds) {
        if (totalSeconds <= 0) return "00:00";
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        const pad = n => n.toString().padStart(2, '0');
        return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }

    // --- Main Utility Loop (Shop + Timers) ---
    function utilityLoop() {
        const now = new Date();
        const nowMs = Date.now();
        
        // 1. 타이머 처리
        for (const type in timerDefs) {
            const def = timerDefs[type];
            const el = document.getElementById(def.displayId);
            const endTimeStr = localStorage.getItem(def.key);
            
            if (endTimeStr) {
                const diffMs = parseInt(endTimeStr) - nowMs;
                if (diffMs > 0) {
                    el.textContent = formatTime(Math.ceil(diffMs / 1000));
                    el.classList.remove('expired');
                } else {
                    el.textContent = "00:00";
                    el.classList.add('expired');
                    if (!timerNotified[type]) {
                        playAlarmSound();
                        showNotification("타이머 알림", `${def.label} 시간이 다 되었습니다!`);
                        timerNotified[type] = true;
                    }
                }
            }
        }
        
        // 2. 변동상점 갱신 시간 계산 (3시간 간격: 0, 3, 6, 9, 12, 15, 18, 21)
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        
        const isRefreshHour = (currentHour % 3 === 0);
        const isJustRefreshed = isRefreshHour && currentMinute < 10; // 정각부터 10분간 강조
        
        // 다음 갱신 시간 계산 (현재 9시면 다음은 12시)
        let nextHour = Math.floor(currentHour / 3) * 3 + 3;
        let nextRefresh = new Date(now);
        nextRefresh.setHours(nextHour, 0, 0, 0);
        
        let diffShopMs = nextRefresh - now;
        let diffShopMins = Math.floor(diffShopMs / 60000);
        let hoursLeft = Math.floor(diffShopMins / 60);
        let minsLeft = diffShopMins % 60;
        
        const shopBox = document.getElementById('shopStatusBox');
        const shopTimeText = document.getElementById('shopTimeText');
        
        if (isJustRefreshed) {
            shopBox.classList.add('shop-refreshed');
            shopTimeText.innerHTML = `🔥 <b>방금 시세가 변동되었습니다!</b><br><span style="font-size:12px; font-weight: 500;">(${currentMinute}분 전 갱신 완료 / 다음 갱신: ${nextHour % 24}시)</span>`;
        } else {
            shopBox.classList.remove('shop-refreshed');
            shopTimeText.innerHTML = `다음 갱신: <b>${nextHour % 24}시 00분</b><br><span style="font-size:12px; font-weight: 500;">(${hoursLeft}시간 ${minsLeft}분 남음)</span>`;
        }
    }

    window.onload = init;
</script>
